prereg_version: "feasibility-v1.0"
feasibility_audit_only: true
post_3d_pivot_exploratory_success: true

identity:
  family: oil_wti
  desk: wti_lag_all_calendar_1d_audit_candidate
  target_state: S2
  decision_unit: sign
  target_variable: wti_front_1d_return_sign
  target_horizon: 1d

contract_refs:
  decision_contract_hash: TBD_AT_LOCK_TIME
  data_contract_hash:     TBD_AT_LOCK_TIME
  governance_hash:        TBD_AT_LOCK_TIME
  feasibility_spec_v1_hash: TBD_AT_LOCK_TIME
  feasibility_dependence_analysis_hash: TBD_AT_LOCK_TIME

model:
  class: feasibility.candidates.wti_lag_1d.classical.WTILag1DLogisticModel
  version: "1.0.0"
  features:
    - name: wti_prev_trading_day_1d_log_return
      source: fred_wti_spot_proxy
      transform: strict_previous_trading_day_log_return_1d
      leakage_guard: excludes_event_day_daily_price
      quality_floor: 0.85
  hyperparameters:
    penalty: l2
    C: 0.25
    fit_intercept: true
    solver: lbfgs
    max_iter: 200
    random_state: 42
  seed: 42

baselines:
  - name: zero_return_baseline
    parameters: {}

outer_protocol:
  type: rolling_origin_walk_forward
  min_train_events: 52
  refit_cadence: monthly
  forecast_cadence: all_registered_calendar_events
  horizon_days: 1
  purge_days: 1
  embargo_days: 1
  regime: A_fully_frozen_after_forward_lock

challenger_protocol:
  type: combinatorial_purged_cv
  blocks: 6
  test_blocks: 1
  purge_days: 1
  embargo_days: 1

metrics:
  primary:
    - directional_accuracy
  secondary:
    - log_loss
    - brier_score
    - dm_hac_one_sided_ci
    - moving_block_bootstrap_ci
  shadow_rule:
    form: feasibility_audit_only_no_capital_implication
    diagnostics: [residual_autocorrelation_rho_1_2_3, hac_effective_n, block_bootstrap_effective_n]

promotion_thresholds:
  directional_accuracy_min_vs_zero_return_baseline_pp: 5.0
  dm_alpha: 0.05
  hac_effective_n_floor: 250
  block_bootstrap_effective_n_floor: 250

abstention:
  degradation_ladder:
    n_soft: 3
    decay_lambda: 0.20
  hard_gates:
    data: true
    model: true
    operational: false

allowed_deviations:
  - fred_wti_proxy_lag_documented_in_manifest
  - forward_lock_required_before_promotion

forbidden_after_lock:
  - change_features
  - change_model_class
  - change_hyperparameters
  - change_thresholds
  - peek_outer_oos
  - adjust_baseline_configuration
  - alter_shadow_rule
  - register_as_v2_desk_without_promotion_review

operator:
  role: author
  ts: 2026-04-29T00:00:00Z
  fingerprint: pending_v2.0
  notes: |
    Authored after the 3d candidate family failed residual-mode Phase 3.
    The historical pass is therefore a provisional/exploratory success, not
    promotion-grade pre-registration. Promotion requires locking this file,
    preserving the strict previous-trading-day leakage guard, and scoring a
    forward holdout without changing features or thresholds.

