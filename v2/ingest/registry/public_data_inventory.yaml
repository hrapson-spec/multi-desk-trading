    source_url: https://www.opec.org/opec_web/en/publications/202.htm
    retrieval_method: manual_event_feature
    rights_status: manual_only
    model_eligible: false
    frequency: monthly
    history_start: null
    release_calendar_ref: event_calendar.yaml
    notes: "Documented but not ingested; release-day flag only via event_calendar."

  - key: iea_omr
