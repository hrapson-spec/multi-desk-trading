  # -------------------------------------------------------------------------
  # CME public CL contract metadata (METADATA ONLY — not model-eligible)
  # -------------------------------------------------------------------------
  - key: cme_cl_contract_metadata
    source: cme
    series_id: CL
    description: "CME Light Sweet Crude Oil (CL) public contract specification metadata"
    source_url: https://www.cmegroup.com/markets/energy/crude-oil/light-sweet-crude.contractSpecs.html
    retrieval_method: html_scrape
    rights_status: display_only
    model_eligible: false
    frequency: irregular
    history_start: null
    release_calendar_ref: cme_cl_contract_metadata.yaml
    notes: |
      Metadata only: contract unit, expiry rule, physical-settlement flag, last-trade-date list.
      Non-display market data (prices, settlements, volumes, open interest) is NOT authorised
      under CME's public terms; ingester MUST refuse to write any price/quote columns.

  # -------------------------------------------------------------------------
  # OPEC MOMR / IEA OMR — manual-only event features
  # -------------------------------------------------------------------------
  - key: opec_momr
