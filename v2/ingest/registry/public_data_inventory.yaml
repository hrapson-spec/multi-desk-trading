# Public-data inventory for multi-desk-trading v2 (Phase B2b).
#
# Rights-gate invariant (enforced by public_data_registry.py validator):
#   rights_status != "public"  =>  model_eligible MUST be false.
#
# Operator runbook: docs/v2/operator_runbook_public_data.md
# Rights matrix:    docs/v2/public_data_rights_and_limitations.md

entries:
  # -------------------------------------------------------------------------
  # FRED prices (canonical model-eligible source for WTI/Brent spot)
  # -------------------------------------------------------------------------
  - key: fred_dcoilwtico
    source: fred
    series_id: DCOILWTICO
    description: "Cushing OK WTI Spot Price FOB (daily, USD/bbl)"
    source_url: https://fred.stlouisfed.org/series/DCOILWTICO
    retrieval_method: api
    rights_status: public
    model_eligible: true
    frequency: daily
    history_start: 1986-01-02
    release_calendar_ref: fred_alfred.yaml

  - key: fred_dcoilbrenteu
    source: fred
    series_id: DCOILBRENTEU
    description: "Brent Crude Oil Spot Price (daily, USD/bbl)"
    source_url: https://fred.stlouisfed.org/series/DCOILBRENTEU
    retrieval_method: api
    rights_status: public
    model_eligible: true
    frequency: daily
    history_start: 1987-05-20
    release_calendar_ref: fred_alfred.yaml

  # -------------------------------------------------------------------------
  # FRED macro / risk
